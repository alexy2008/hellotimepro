server:
  port: ${PORT:29000}
  address: ${HOST:0.0.0.0}

spring:
  application:
    name: hellotime-pro-spring-boot
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:55432/hellotime_pro}
    username: ${DB_USERNAME:hellotime}
    password: ${DB_PASSWORD:hellotime}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT_MS:30000}
  flyway:
    locations: classpath:db/migration/${DB_DRIVER:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

app:
  service-name: hellotime-pro
  service-version: 0.1.0
  db-driver: ${DB_DRIVER:postgres}
  jwt-secret: ${JWT_SECRET:dev-secret-change-me}
  access-token-ttl-seconds: ${ACCESS_TOKEN_TTL_SECONDS:3600}
  refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:604800}
  login-rate-limit-per-minute: ${LOGIN_RATE_LIMIT_PER_MINUTE:10}
  repo-root: ${REPO_ROOT:../..}
