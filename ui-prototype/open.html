<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>开启 · HelloTime Pro</title>
  <link rel="stylesheet" href="assets/prototype.css" />
</head>
<body>

<header class="cy-header">
  <div class="cy-container cy-header__inner">
    <a class="cy-brand" href="index.html">
      <img class="cy-brand__mark" src="../spec/assets/logo.svg" width="38" height="38" alt="" />
      HelloTime<span class="cy-brand__pro">PRO</span>
    </a>
    <nav class="cy-nav">
      <a href="index.html">广场</a>
      <a href="open.html" class="cy-nav__active">开启</a>
      <a href="about.html">关于</a>
    </nav>
    <div class="cy-header__actions">
      <button class="cy-theme-toggle" data-theme-toggle aria-label="切换主题">
        <span data-theme-toggle-icon>☾</span>
      </button>
      <a class="cy-btn cy-btn--ghost cy-btn--sm" href="login.html">登录</a>
      <a class="cy-btn cy-btn--primary cy-btn--sm" href="register.html">注册</a>
    </div>
  </div>
</header>

<main class="cy-container">
  <div class="cy-open-center">
    <h1>用 8 位密钥开启胶囊</h1>
    <p>输入朋友分享给你的 8 位大写字母和数字，可直接查看胶囊。</p>

    <form class="cy-code-input" onsubmit="event.preventDefault(); location.href='capsule-opened.html'" style="margin-bottom: var(--space-8)">
      <input maxlength="1" value="8" />
      <input maxlength="1" value="F" />
      <input maxlength="1" value="2" />
      <input maxlength="1" value="K" />
      <input maxlength="1" value="9" />
      <input maxlength="1" value="R" />
      <input maxlength="1" value="4" />
      <input maxlength="1" value="M" />
    </form>

    <div style="display:flex; gap: var(--space-3); justify-content: center; flex-wrap: wrap">
      <button class="cy-btn cy-btn--primary cy-btn--lg" onclick="location.href='capsule-opened.html'">开启 →</button>
      <button class="cy-btn cy-btn--ghost cy-btn--lg">粘贴识别</button>
    </div>

    <div style="margin-top: var(--space-10); color: var(--color-text-muted); font-size: var(--font-size-sm)">
      <div style="display:flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap">
        <span>💡 可用 <code style="background: var(--color-surface-2); padding: 2px 6px; border-radius: var(--radius-sm)">/c/8F2K9R4M</code> 直链访问</span>
        <span>🔒 未到开启时间的胶囊也会显示倒计时</span>
      </div>
    </div>
  </div>

  <!-- 错误态示例 -->
  <div style="max-width: 560px; margin: 0 auto">
    <div class="cy-alert cy-alert--danger">
      <span>⚠</span>
      <span>找不到这条胶囊，请检查 8 位码是否输入正确 · <code style="opacity:0.8">NOT_FOUND</code></span>
    </div>
  </div>
</main>

<footer class="cy-footer">
  <div class="cy-container cy-footer__inner">
    <div>© 2026 HelloTime Pro</div>
    <div class="cy-stack">
      <span class="cy-stack__item"><img src="../spec/icons/react.svg" alt="">React</span>
      <span class="cy-stack__item"><img src="../spec/icons/typescript.svg" alt="">TypeScript</span>
      <span class="cy-stack__item"><img src="../spec/icons/fastapi.svg" alt="">FastAPI</span>
      <span class="cy-stack__item"><img src="../spec/icons/python.svg" alt="">Python</span>
      <span class="cy-stack__item"><img src="../spec/icons/postgresql.svg" alt="">PostgreSQL</span>
    </div>
  </div>
</footer>

<script src="assets/demo.js"></script>
</body>
</html>
