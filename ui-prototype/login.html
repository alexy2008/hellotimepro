<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 · HelloTime Pro</title>
  <link rel="stylesheet" href="assets/prototype.css" />
</head>
<body>

<header class="cy-header">
  <div class="cy-container cy-header__inner">
    <a class="cy-brand" href="index.html">
      <img class="cy-brand__mark" src="../spec/assets/logo.svg" width="38" height="38" alt="" />
      HelloTime<span class="cy-brand__pro">PRO</span>
    </a>
    <nav class="cy-nav">
      <a href="index.html">广场</a>
      <a href="open.html">开启</a>
      <a href="about.html">关于</a>
    </nav>
    <div class="cy-header__actions">
      <button class="cy-theme-toggle" data-theme-toggle aria-label="切换主题">
        <span data-theme-toggle-icon>☾</span>
      </button>
      <a class="cy-btn cy-btn--primary cy-btn--sm" href="register.html">注册</a>
    </div>
  </div>
</header>

<main class="cy-container cy-container--narrow" style="margin-top: var(--space-12); margin-bottom: var(--space-16)">
  <div class="cy-card" style="max-width: 440px; margin: 0 auto">
    <h1 style="font-family: var(--font-display); font-size: var(--font-size-3xl); margin: 0 0 var(--space-2)">欢迎回来</h1>
    <p style="color: var(--color-text-secondary); margin: 0 0 var(--space-8)">你留给未来的信，还在等你开启。</p>

    <form class="cy-form" onsubmit="event.preventDefault(); location.href='me-created.html'">
      <div class="cy-field">
        <label for="email">邮箱</label>
        <input class="cy-input" id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="cy-field">
        <label for="pwd">密码</label>
        <input class="cy-input" id="pwd" type="password" placeholder="至少 8 位" autocomplete="current-password" required />
        <span class="cy-field__hint">忘记密码？M1 版本暂不支持找回，请联系管理员重置。</span>
      </div>

      <button class="cy-btn cy-btn--primary cy-btn--lg" type="submit" style="width: 100%">登录</button>

      <div style="text-align:center; color: var(--color-text-muted); font-size: var(--font-size-sm)">
        还没有账号？<a href="register.html" style="color: var(--color-brand-primary)">立即注册</a>
      </div>
    </form>
  </div>

  <!-- 错误态示例（静态展示） -->
  <div style="max-width: 440px; margin: var(--space-6) auto 0">
    <div class="cy-alert cy-alert--danger">
      <span>⚠</span>
      <span>邮箱或密码错误 · <code style="opacity:0.8">UNAUTHORIZED</code></span>
    </div>
  </div>
</main>

<footer class="cy-footer">
  <div class="cy-container cy-footer__inner">
    <div>© 2026 HelloTime Pro</div>
    <div class="cy-stack">
      <span class="cy-stack__item"><img src="../spec/icons/react.svg" alt="">React</span>
      <span class="cy-stack__item"><img src="../spec/icons/typescript.svg" alt="">TypeScript</span>
      <span class="cy-stack__item"><img src="../spec/icons/fastapi.svg" alt="">FastAPI</span>
      <span class="cy-stack__item"><img src="../spec/icons/python.svg" alt="">Python</span>
      <span class="cy-stack__item"><img src="../spec/icons/postgresql.svg" alt="">PostgreSQL</span>
    </div>
  </div>
</footer>

<script src="assets/demo.js"></script>
</body>
</html>
