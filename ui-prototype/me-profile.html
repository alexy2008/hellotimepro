<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>账号设置 · HelloTime Pro</title>
  <link rel="stylesheet" href="assets/prototype.css" />
</head>
<body>

<header class="cy-header">
  <div class="cy-container cy-header__inner">
    <a class="cy-brand" href="index.html">
      <img class="cy-brand__mark" src="../spec/assets/logo.svg" width="38" height="38" alt="" />
      HelloTime<span class="cy-brand__pro">PRO</span>
    </a>
    <nav class="cy-nav">
      <a href="index.html">广场</a>
      <a href="open.html">开启</a>
      <a href="about.html">关于</a>
    </nav>
    <div class="cy-header__actions">
      <button class="cy-theme-toggle" data-theme-toggle aria-label="切换主题">
        <span data-theme-toggle-icon>☾</span>
      </button>
      <a class="cy-user-chip" href="me-created.html">
        <span>specter</span>
        <img src="../spec/avatars/specter.svg" alt="">
      </a>
    </div>
  </div>
</header>

<main class="cy-container">
  <div class="cy-me">

    <aside class="cy-me__nav">
      <a href="me-created.html">📝 我创建的 <span style="color: var(--color-text-muted); margin-left:auto">4</span></a>
      <a href="me-favorites.html">♥ 我收藏的 <span style="color: var(--color-text-muted); margin-left:auto">23</span></a>
      <a href="me-profile.html" class="is-active">⚙ 账号设置</a>
      <span style="border-top: 1px solid var(--color-border-subtle); margin: var(--space-3) 0"></span>
      <a href="login.html" style="color: var(--color-danger-fg)">登出</a>
    </aside>

    <section class="cy-me__content">
      <h1>账号设置</h1>

      <!-- 基本信息 -->
      <div class="cy-card" style="margin-bottom: var(--space-6)">
        <h2 style="font-size: var(--font-size-xl); margin: 0 0 var(--space-5); font-family: var(--font-display)">基本信息</h2>

        <form class="cy-form">
          <div class="cy-field">
            <label>邮箱</label>
            <input class="cy-input" value="specter@example.com" disabled />
            <span class="cy-field__hint">邮箱作为登录账号不可修改；如需更换请联系管理员。</span>
          </div>

          <div class="cy-field">
            <label for="nick">昵称</label>
            <input class="cy-input" id="nick" value="specter" maxlength="24" />
          </div>

          <div class="cy-field">
            <label>头像</label>
            <div class="cy-avatar-picker" data-seg>
              <button type="button" class="cy-avatar-picker__item"><img src="../spec/avatars/neo.svg" alt="新生" /></button>
              <button type="button" class="cy-avatar-picker__item cy-seg__active"><img src="../spec/avatars/specter.svg" alt="幽影" /></button>
              <button type="button" class="cy-avatar-picker__item"><img src="../spec/avatars/glyph.svg" alt="符文" /></button>
              <button type="button" class="cy-avatar-picker__item"><img src="../spec/avatars/pulse.svg" alt="心跳" /></button>
              <button type="button" class="cy-avatar-picker__item"><img src="../spec/avatars/circuit.svg" alt="电路" /></button>
              <button type="button" class="cy-avatar-picker__item"><img src="../spec/avatars/nova.svg" alt="新星" /></button>
              <button type="button" class="cy-avatar-picker__item"><img src="../spec/avatars/oracle.svg" alt="神谕" /></button>
              <button type="button" class="cy-avatar-picker__item"><img src="../spec/avatars/drift.svg" alt="漂流" /></button>
              <button type="button" class="cy-avatar-picker__item"><img src="../spec/avatars/echo.svg" alt="回声" /></button>
              <button type="button" class="cy-avatar-picker__item"><img src="../spec/avatars/void.svg" alt="深渊" /></button>
            </div>
          </div>

          <div style="display:flex; gap: var(--space-3); justify-content: flex-end">
            <button type="button" class="cy-btn cy-btn--ghost">重置</button>
            <button class="cy-btn cy-btn--primary" type="button">保存更改</button>
          </div>
        </form>
      </div>

      <!-- 修改密码 -->
      <div class="cy-card" style="margin-bottom: var(--space-6)">
        <h2 style="font-size: var(--font-size-xl); margin: 0 0 var(--space-5); font-family: var(--font-display)">修改密码</h2>
        <form class="cy-form">
          <div class="cy-field">
            <label for="oldPwd">当前密码</label>
            <input class="cy-input" id="oldPwd" type="password" />
          </div>
          <div class="cy-field">
            <label for="newPwd">新密码</label>
            <input class="cy-input" id="newPwd" type="password" placeholder="至少 8 位" />
            <span class="cy-field__hint">修改后其他设备上的 refresh token 将被全部吊销，需要重新登录。</span>
          </div>
          <div class="cy-field">
            <label for="confirmPwd">确认新密码</label>
            <input class="cy-input" id="confirmPwd" type="password" />
          </div>

          <div style="display:flex; justify-content: flex-end">
            <button class="cy-btn cy-btn--primary" type="button">更新密码</button>
          </div>
        </form>
      </div>

      <!-- 危险区 -->
      <div class="cy-card" style="border-color: var(--color-danger-border); background: color-mix(in srgb, var(--color-danger-bg) 20%, var(--color-surface-1))">
        <h2 style="font-size: var(--font-size-xl); margin: 0 0 var(--space-3); color: var(--color-danger-fg); font-family: var(--font-display)">危险操作</h2>
        <p style="color: var(--color-text-secondary); margin: 0 0 var(--space-4)">
          注销账号会删除所有未开启的胶囊，已开启的胶囊会保留在广场但显示为"匿名用户"。
          <strong style="color: var(--color-text-primary)">此操作不可撤销。</strong>
        </p>
        <button class="cy-btn cy-btn--ghost" style="color: var(--color-danger-fg); border-color: var(--color-danger-border)">注销账号…</button>
      </div>
    </section>
  </div>
</main>

<footer class="cy-footer">
  <div class="cy-container cy-footer__inner">
    <div>© 2026 HelloTime Pro</div>
    <div class="cy-stack">
      <span class="cy-stack__item"><img src="../spec/icons/react.svg" alt="">React</span>
      <span class="cy-stack__item"><img src="../spec/icons/typescript.svg" alt="">TypeScript</span>
      <span class="cy-stack__item"><img src="../spec/icons/fastapi.svg" alt="">FastAPI</span>
      <span class="cy-stack__item"><img src="../spec/icons/python.svg" alt="">Python</span>
      <span class="cy-stack__item"><img src="../spec/icons/postgresql.svg" alt="">PostgreSQL</span>
    </div>
  </div>
</footer>

<script src="assets/demo.js"></script>
</body>
</html>
