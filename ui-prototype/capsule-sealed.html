<main class="cy-container">
  <div class="cy-capsule-detail">

      <span class="cy-badge cy-badge--sealed">未开启</span>
      <span class="cy-capsule__code">T9W6N3BK</span>

    </div>

    <h1 class="cy-capsule-detail__title">给十年后的你</h1>

    <div class="cy-capsule-detail__sealed">
      <div style="font-size: var(--font-size-4xl); opacity: 0.7">🔒</div>
      <div style="color: var(--color-text-secondary); margin-top: var(--space-3); font-size: var(--font-size-sm); letter-spacing: 0.1em">
        这封信还在上锁，将在以下时刻开启
      </div>
      <div class="cy-countdown" style="font-size: var(--font-size-5xl); margin: var(--space-4) 0">
        3,507 <span style="font-size: 0.4em; color: var(--color-text-muted)">天</span>
        04 <span style="font-size: 0.4em; color: var(--color-text-muted)">时</span>
        22 <span style="font-size: 0.4em; color: var(--color-text-muted)">分</span>
        18 <span style="font-size: 0.4em; color: var(--color-text-muted)">秒</span>
      </div>
      <div style="color: var(--color-text-secondary); font-size: var(--font-size-base)">
        开启于 <strong style="color: var(--color-text-primary)">2036-01-01 00:00:00 (UTC+8)</strong>
      </div>
    </div>

    <div style="margin-top: var(--space-6); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-3)">
      <div style="display: flex; align-items: center; gap: var(--space-2); color: var(--color-text-secondary); font-size: var(--font-size-sm)">
        来自 <img src="../spec/avatars/oracle.svg" alt="" style="width:28px; height:28px; border-radius: 50%"> <strong style="color: var(--color-text-primary)">神谕.88</strong>
      </div>
      <div style="display: flex; gap: var(--space-3)">
        <button class="cy-btn cy-btn--ghost">📎 复制 8 位码</button>
        <button class="cy-btn cy-btn--ghost">🔗 分享链接</button>
        <button class="cy-btn cy-btn--ghost"><span style="color: var(--color-favorite-inactive)">♡</span> 收藏（到时通知我）</button>
      </div>
    </div>

    <div class="cy-alert cy-alert--info" style="margin-top: var(--space-6)">
      <span>ⓘ</span>
      <span>未开启的胶囊仅显示标题与倒计时，内容将在开启后公开到广场。</span>
